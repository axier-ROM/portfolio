name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build temporary offline page
        shell: bash
        run: |
          mkdir -p dist
          cat > dist/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Portfolio temporarily offline</title>
              <style>
                html, body {
                  margin: 0;
                  min-height: 100%;
                  background: #050505;
                  color: #e5e5e5;
                  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                }
                body {
                  display: grid;
                  place-items: center;
                }
                main {
                  max-width: 520px;
                  padding: 32px;
                }
                p {
                  color: #999;
                  line-height: 1.6;
                }
                span {
                  color: #c8ff00;
                }
              </style>
            </head>
            <body>
              <main>
                <span>// portfolio offline</span>
                <h1>Temporarily unavailable</h1>
                <p>This portfolio is being refreshed and will be back shortly.</p>
              </main>
            </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
